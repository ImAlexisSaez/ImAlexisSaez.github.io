hugoblox:
    schema: "2.0"
    identity:
        name: Infinitos Contrastes
        type: person
        tagline: "Profesor de Matemáticas"
        description:
            "Página web personal de Alexis Sáez, profesor de matemáticas."
    theme:
        mode: system
        pack: default
        colors:
            primary: ""
            secondary: ""
            neutral: ""
    typography:
        font: modern
        size: md
    layout:
        radius: md
        spacing: comfortable
        avatar_shape: circle
    header:
        enable: true
        style: navbar
        sticky: true
        align: center
        search: true
        theme_toggle: true
    footer:
        style: minimal
        language_switcher: true
    copyright:
        notice: © {year} {name}
    content:
        math:
            enable: true
        toc:
            enable: true
        reading_time:
            enable: true
    search:
        enable: true
