bio: "**Infinitos Contrastes** es una herramienta de aprendizaje en múltiples dimensiones. Su objetivo es posibilitar que el recorrido a través de las distintas enseñanzas se plantee de una manera activa, a partir de la transmisión de ideas o experiencias.\n Mi educación e intereses condiciona evidentemente el trasfondo de esta página web, que refleja una constante batalla contra la *Hidra de Lerna*: cada conocimiento nuevo adquirido orgina, al menos, dos inesperadas carencias que suplir, haciendo de este infinito viaje una experiencia maravillosa.\n"
